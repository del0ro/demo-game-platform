[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
version_locations = %(here)s/migrations/versions
file_template = %%(rev)s_%%(slug)s
revision_environment = true
output_encoding = utf-8
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
